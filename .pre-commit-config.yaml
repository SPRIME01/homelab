# Pre-commit configuration for Smart Home K3s Lab
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - types-setuptools
        files: ^(src|scripts|infrastructure)/.*\.py$

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Bandit Security Scan
        args: [-r, src/, scripts/, infrastructure/, -f, json]
        files: \.py$

  # Conventional Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: uv-check
        name: UV Environment Check
        entry: uv run python scripts/_uv_utils.py
        language: system
        pass_filenames: false
        always_run: true

      # Enhanced test validation
      - id: pytest-unit
        name: Unit Tests
        entry: uv run pytest tests/unit/ -q --tb=short
        language: system
        types: [python]
        pass_filenames: false

      - id: coverage-check
        name: Coverage Validation
        entry: uv run pytest tests/unit/ --cov=src --cov=scripts --cov=infrastructure --cov-fail-under=85 -q
        language: system
        types: [python]
        pass_filenames: false

# CI Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_branch: 'develop'
  autoupdate_schedule: weekly
